<!doctype html>
<!--
  Splash screen — "The Class Record".

  Shown the instant the app launches, replaced by the gradebook via a
  cross-fade once the embedded server answers (see main.js). The artwork is
  embedded as base64 so the splash is ONE packaged file with zero network or
  disk dependencies — it must be able to paint before anything else exists.

  Design intent (ROADMAP.md Phase 1 / Appendix A-1): premium and CALM.
  Real stage text from the main process, one quality still artwork, a single
  restrained logo reveal — no particles, no animated backgrounds, no fake
  progress. The wait should feel intentional, not decorated.

  The base64 artwork lives on the single <img id="art"> line — edit around
  it; everything else is ordinary HTML/CSS.
-->
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    --ink: #1e3a8a;        /* wordmark — the app's deep ink blue */
    --ink-soft: #475569;   /* stage text */
    --ink-faint: #94a3b8;  /* version / device footer */
    --paper: #faf7f2;      /* matches the artwork's paper white */
  }
  html, body {
    margin: 0; height: 100%; overflow: hidden; background: var(--paper);
    font-family: 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; user-select: none; cursor: default;
    -webkit-app-region: drag; /* let the teacher move the window during a long cold start */
  }
  #art {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center;
  }
  /* Soft paper wash behind the text zone so type stays crisp on any crop. */
  #wash {
    position: absolute; left: 0; right: 40%; top: 45%; bottom: 0;
    background: linear-gradient(to top right, rgba(250,247,242,.94) 30%, rgba(250,247,242,0) 75%);
  }
  #content {
    position: absolute; left: 36px; bottom: 30px; right: 36px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .reveal { opacity: 0; transform: translateY(7px); animation: rise .5s ease-out forwards; }
  @keyframes rise { to { opacity: 1; transform: none; } }
  #brand { display: flex; align-items: center; gap: 12px; }
  #mark { animation-delay: .05s; }
  #name { animation-delay: .12s; font-size: 26px; font-weight: 600; letter-spacing: -0.2px; color: var(--ink); line-height: 1.15; }
  #stage-row { animation-delay: .3s; margin-top: 6px; height: 18px; }
  #stage { font-size: 12.5px; color: var(--ink-soft); transition: opacity .12s ease; }
  #meta { animation-delay: .38s; font-size: 11px; color: var(--ink-faint); letter-spacing: .1px; }
  #meta .dot { margin: 0 6px; }
  body.leaving { transition: opacity .2s ease; opacity: 0; }
</style>
</head>

    // Called by the main process (executeJavaScript) — keep these global.
    function splashInit(info) {
      if (info && info.version) {
        document.getElementById('version').textContent = 'Version ' + info.version;
      }
      if (info && info.device) {
        var d = document.getElementById('device');
        var dot = document.createElement('span');
        dot.className = 'dot';
        dot.textContent = '·';
        d.textContent = '';
        d.append(dot, info.device);
      }
    }
    function setStage(text) {
      var el = document.getElementById('stage');
      if (el.textContent === text) return;
      el.style.opacity = '0';
      setTimeout(function () { el.textContent = text; el.style.opacity = '1'; }, 120);
    }
    function fadeOut() { document.body.classList.add('leaving'); }
